- title: 选择支付方式
  method: post
  url: /saas/order/queryNonPayOrder
  headers:
    platform: saas-jr
  body:
    orderId: "{{orderId}}"
  expected_status_code: 200
  expected_business_codes:
    - 0
    - 200
  expected_keys:
    - code

- title: 查询支付详情
  method: post
  url: /saas/orderCenter/queryDetail
  headers:
    platform: saas-jr
  body:
    orderId: "{{orderId}}"
    searchType: "paymentDetailManager"
    orderType: 1
    marketId: "561863468761264128"
  expected_status_code: 200
  expected_business_codes:
    - 0
    - 200
  expected_keys:
    - code

- title: 支付结果返回
  method: post
  url: /saas/payment/cashPayment
  headers:
    platform: saas-jr
  body:
    payMoney: "233"
    paymentWay: 10
    paySource: 2
    orderId: "{{orderId}}"
  expected_status_code: 200
  expected_business_codes:
    - 0
    - 200
  expected_keys:
    - code
